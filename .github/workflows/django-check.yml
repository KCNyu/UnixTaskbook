name: Django check

# Lightweight smoke test for the Django app. The repo has no Django test suite,
# so this at least proves the dependencies install and the app boots. It is the
# required status check that gates Dependabot auto-merge.
on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  django-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: app/requirements.txt

      - name: Install dependencies
        working-directory: app
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Django system check
        working-directory: app
        run: python manage.py check

      - name: Detect model/migration drift
        working-directory: app
        # Non-blocking: the repo already has pre-existing drift. This surfaces it
        # in the log without failing the build.
        continue-on-error: true
        run: python manage.py makemigrations --check --dry-run
